<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sociograma de centro</title>
<style>
  :root{
    --paper:#F6F4EE;
    --panel:#FFFFFF;
    --ink:#22314F;
    --ink-soft:#5A6785;
    --line:#DEDACB;
    --gold:#C89B3C;
    --gold-soft:#F1E4C3;
    --sage:#5B8266;
    --sage-soft:#E1EBE2;
    --clay:#B5533C;
    --clay-soft:#F4E1DA;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;
    line-height:1.5;
  }
  header.top{
    background:var(--ink);
    color:#fff;
    padding:18px 22px 0 22px;
  }
  header.top h1{
    margin:0 0 4px 0;
    font-family:Georgia,"Iowan Old Style",serif;
    font-size:22px;
    font-weight:600;
    letter-spacing:0.2px;
  }
  header.top p.sub{
    margin:0 0 14px 0;
    color:#C7CEE0;
    font-size:13px;
  }
  nav.tabs{
    display:flex;
    gap:4px;
    flex-wrap:wrap;
  }
  nav.tabs button{
    background:transparent;
    border:none;
    color:#C7CEE0;
    padding:10px 14px;
    font-size:13.5px;
    cursor:pointer;
    border-radius:8px 8px 0 0;
    font-family:inherit;
  }
  nav.tabs button.active{
    background:var(--paper);
    color:var(--ink);
    font-weight:600;
  }
  main{
    max-width:1080px;
    margin:0 auto;
    padding:22px 20px 60px 20px;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:18px;
  }
  h2{
    font-family:Georgia,"Iowan Old Style",serif;
    font-size:19px;
    margin:0 0 12px 0;
    color:var(--ink);
  }
  h3{
    font-size:15.5px;
    margin:18px 0 8px 0;
    color:var(--ink);
  }
  p{margin:0 0 10px 0;}
  .muted{color:var(--ink-soft); font-size:13px;}
  .badge{
    display:inline-block;
    font-size:11.5px;
    font-weight:600;
    padding:2px 8px;
    border-radius:20px;
    background:var(--sage-soft);
    color:var(--sage);
    margin-left:6px;
  }
  .badge.gold{background:var(--gold-soft); color:#8a6a1e;}
  .badge.clay{background:var(--clay-soft); color:var(--clay);}
  label{display:block; font-size:13px; font-weight:600; margin:12px 0 4px 0; color:var(--ink);}
  input[type=text], input[type=number], select, textarea{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:7px;
    font-size:14px;
    font-family:inherit;
    background:#fff;
    color:var(--ink);
  }
  textarea{min-height:70px; resize:vertical;}
  .row{display:flex; gap:12px; flex-wrap:wrap;}
  .row > div{flex:1; min-width:160px;}
  button.btn{
    background:var(--ink);
    color:#fff;
    border:none;
    padding:10px 16px;
    border-radius:7px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
  }
  button.btn:hover{opacity:0.92;}
  button.btn.secondary{
    background:transparent;
    color:var(--ink);
    border:1px solid var(--line);
  }
  button.btn.danger{
    background:var(--clay-soft);
    color:var(--clay);
    border:none;
  }
  button.btn.small{padding:6px 10px; font-size:12.5px;}
  .pick-list{
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 10px;
    max-height:230px;
    overflow-y:auto;
    background:#FCFBF8;
  }
  .pick-list label{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:400;
    font-size:14px;
    margin:6px 0;
    color:var(--ink);
  }
  .pick-list input{width:auto;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{
    text-align:left;
    padding:8px 9px;
    border-bottom:1px solid var(--line);
    vertical-align:top;
  }
  th{color:var(--ink-soft); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:0.3px;}
  tr:hover td{background:#FBF9F3;}
  .empty{
    text-align:center;
    padding:30px 10px;
    color:var(--ink-soft);
    font-size:14px;
  }
  .group-card{
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px 14px;
    margin-bottom:10px;
    background:#FCFBF8;
  }
  .group-card .head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
  }
  .disclaimer{
    background:#FCF7EA;
    border:1px solid var(--gold-soft);
    border-radius:8px;
    padding:12px 14px;
    font-size:12.5px;
    color:#6B5622;
    margin-top:16px;
  }
  .gate{
    text-align:center;
    padding:50px 20px;
  }
  .stat-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin:14px 0;
  }
  .stat-box{
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    background:#FCFBF8;
  }
  .stat-box .n{font-size:20px; font-weight:700; color:var(--ink);}
  .stat-box .lbl{font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.3px;}
  .legend{display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:var(--ink-soft); margin-top:8px;}
  .legend span{display:inline-flex; align-items:center; gap:5px;}
  .swatch{width:14px; height:3px; display:inline-block;}
  .dot{width:12px; height:12px; border-radius:50%; display:inline-block;}
  svg text{font-family:inherit;}
  .toolbar{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px;}
  ul.tight{margin:6px 0; padding-left:18px;}
  ul.tight li{margin-bottom:4px; font-size:13.5px;}
  .checkline{display:flex; align-items:center; gap:8px; font-weight:400; margin:8px 0;}
  .checkline input{width:auto;}
  .toast{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:8px;
    font-size:13.5px; z-index:50; box-shadow:0 4px 16px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>
<header class="top">
  <h1>Sociograma de centro</h1>
  <p class="sub">Análisis de relaciones interpersonales y convivencia — de 1.º de ESO a 2.º de Bachillerato</p>
  <nav class="tabs" id="tabs"></nav>
</header>
<main id="app"></main>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script>
/* ============ FIREBASE ============ */
// Sustituye estos valores por los de TU proyecto de Firebase (Configuración del proyecto > Tus apps > SDK setup).
const firebaseConfig = {
  apiKey: "AIzaSyBcBknBLQTsLzLciE_2uXEPSbgU0A43bbM",
  authDomain: "sociograma-triana.firebaseapp.com",
  databaseURL: "https://sociograma-triana-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "sociograma-triana",
  storageBucket: "sociograma-triana.firebasestorage.app",
  messagingSenderId: "646919164665",
  appId: "1:646919164665:web:32b71b76ca179117f2c828"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
</script>
<script>
/* ============ CONFIG ============ */
const CURSOS = ["1º ESO","2º ESO","3º ESO","4º ESO","1º Bachillerato","2º Bachillerato"];
const Q1_LABEL = {
  ESO: "¿Con qué compañeros o compañeras de tu clase te gustaría trabajar en grupo? (elige entre 1 y 3)",
  BACH: "¿Con qué compañeros o compañeras preferirías trabajar en un proyecto de clase? (elige entre 1 y 3)"
};
const Q2_LABEL = {
  ESO: "¿Con qué compañeros o compañeras preferirías hacer una excursión o actividad de convivencia? (elige entre 1 y 3)",
  BACH: "¿Con qué compañeros o compañeras preferirías compartir una actividad fuera del aula? (elige entre 1 y 3)"
};
const Q3_LABEL = {
  ESO: "Si tuvieras un problema personal o académico, ¿a qué compañero o compañera acudirías?",
  BACH: "¿En qué compañero o compañera confiarías si tuvieras un problema personal o académico?"
};
const Q4_LABEL = {
  ESO: "¿Qué compañero o compañera crees que ayuda más a los demás?",
  BACH: "¿Qué compañero o compañera consideras más dispuesto a ayudar a los demás?"
};
const Q5_LABEL = {
  ESO: "¿Quién suele influir positivamente en el grupo?",
  BACH: "¿Quién dirías que tiene más influencia positiva sobre el grupo?"
};
const Q6_LABEL = {
  ESO: "¿Con qué compañero o compañera te resulta más difícil trabajar? (opcional, máximo 2)",
  BACH: "¿Con qué compañero o compañera te resulta más difícil trabajar? (opcional, máximo 2)"
};
const Q7_LABEL = {
  ESO: "¿Crees que algún compañero o compañera está solo/a o poco integrado/a? (opcional, máximo 2)",
  BACH: "¿Consideras que alguien del grupo está poco integrado o participa poco? (opcional, máximo 2)"
};
const Q8_LABEL = {
  ESO: "¿Con qué persona de la clase te gustaría relacionarte más?",
  BACH: "¿Con qué persona de la clase te gustaría relacionarte más de lo que lo haces ahora?"
};

/* ============ STORAGE (Firebase Realtime Database) ============ */
function withTimeout(promise, ms){
  return new Promise((resolve)=>{
    let done = false;
    const timer = setTimeout(()=>{ if(!done){ done=true; resolve({timedOut:true}); } }, ms);
    Promise.resolve(promise).then((v)=>{
      if(!done){ done=true; clearTimeout(timer); resolve({timedOut:false, value:v}); }
    }).catch((err)=>{
      if(!done){ done=true; clearTimeout(timer); resolve({timedOut:false, error:err}); }
    });
  });
}
async function fbGet(path){
  try{
    if(!db){ showErrorBanner('Firebase no está inicializado. Revisa firebaseConfig.'); return null; }
    const r = await withTimeout(db.ref(path).once('value'), 8000);
    if(r.timedOut){ showErrorBanner('Firebase tardó demasiado en responder al leer "'+path+'".'); return null; }
    if(r.error){ showErrorBanner('Error leyendo "'+path+'": ' + r.error.message); return null; }
    return r.value.exists() ? r.value.val() : null;
  }catch(e){ showErrorBanner('Error leyendo "'+path+'": ' + e.message); return null; }
}
async function fbSet(path, value){
  try{
    if(!db){ showErrorBanner('Firebase no está inicializado. Revisa firebaseConfig.'); return false; }
    const r = await withTimeout(db.ref(path).set(value), 8000);
    if(r.timedOut){ showErrorBanner('Firebase tardó demasiado en guardar "'+path+'". Vuelve a intentarlo.'); return false; }
    if(r.error){ showErrorBanner('Error guardando "'+path+'": ' + r.error.message); return false; }
    return true;
  }catch(e){ showErrorBanner('Error guardando "'+path+'": ' + e.message); return false; }
}
async function fbRemove(path){
  try{
    if(!db) return false;
    await db.ref(path).remove();
    return true;
  }catch(e){ showErrorBanner('Error eliminando "'+path+'": ' + e.message); return false; }
}
function toCleanArray(v){
  // Firebase puede devolver una lista como array normal, como objeto {0:.., 2:..} si hay huecos,
  // o puede faltar directamente. Esto lo normaliza todo a un array limpio sin huecos ni nulos.
  if(Array.isArray(v)) return v.filter(x=> x!==null && x!==undefined);
  if(v && typeof v === 'object') return Object.values(v).filter(x=> x!==null && x!==undefined);
  return [];
}
function normalizeConfig(cfg){
  const groupsArr = toCleanArray(cfg && cfg.groups);
  return {
    groups: groupsArr
      .filter(g=> g && typeof g === 'object')
      .map(g=>({
        id: g.id,
        curso: g.curso,
        grupo: g.grupo,
        students: toCleanArray(g.students).filter(s=> s && typeof s === 'object')
      }))
  };
}
async function loadConfig(){
  const val = await fbGet('config');
  return normalizeConfig(val);
}
async function saveConfig(cfg){ return fbSet('config', cfg); }
async function loadResponses(groupId){
  // Devuelve un array de respuestas a partir del objeto {codigoAlumno: respuesta} de Firebase.
  const val = await fbGet('responses/'+groupId);
  if(!val) return [];
  return Object.values(val).map(r=>({
    studentCode: r.studentCode,
    timestamp: r.timestamp,
    q1: Array.isArray(r.q1)?r.q1:[],
    q2: Array.isArray(r.q2)?r.q2:[],
    q3: r.q3||'', q4: r.q4||'', q5: r.q5||'',
    q6: Array.isArray(r.q6)?r.q6:[],
    q7: Array.isArray(r.q7)?r.q7:[],
    q8: r.q8||'', q9: r.q9, q10: r.q10||''
  }));
}
async function saveOneResponse(groupId, studentCode, responseObj){
  return fbSet('responses/'+groupId+'/'+studentCode, responseObj);
}

/* ============ STATE ============ */
let state = {
  tab: 'inicio',
  config: {groups:[]},
  teacherUnlocked: false,
  form: { groupId:null, studentCode:null, q1:[], q2:[], q3:'', q4:'', q5:'', q6:[], q7:[], q7none:false, q8:'', q9:null, q10:'' },
  formStep: 'select', // select -> answer -> done
  responsesCache: {}, // groupId -> array
  analysisGroupId: null,
  loading: true,
};

function etapaOf(curso){ return curso.indexOf('Bachillerato')>=0 ? 'BACH' : 'ESO'; }
function abbrevCurso(curso){
  return curso.replace('º','').replace('Bachillerato','BACH').replace('ESO','ESO').replace(/\s+/g,'');
}
function uid(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function avg(arr){ return arr.length? Math.round((arr.reduce((a,b)=>a+b,0)/arr.length)*100)/100 : 0; }
function cursoIndex(curso){ return CURSOS.indexOf(curso); }

function toast(msg){
  const t = document.createElement('div');
  t.className='toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

function showErrorBanner(msg){
  let b = document.getElementById('errorBanner');
  if(!b){
    b = document.createElement('div');
    b.id = 'errorBanner';
    b.style.cssText = 'position:fixed; top:0; left:0; right:0; background:#B5533C; color:#fff; padding:12px 16px; font-size:13px; z-index:100; font-family:monospace; white-space:pre-wrap;';
    document.body.prepend(b);
  }
  b.textContent = '⚠ Error en la app (copia este texto y compártelo): ' + msg;
}
window.addEventListener('error', (e)=>{
  showErrorBanner((e.message||'Error desconocido') + ' — línea ' + e.lineno);
});
window.addEventListener('unhandledrejection', (e)=>{
  showErrorBanner('Promesa rechazada: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
});

/* ============ INIT ============ */
async function ensureAnonAuth(){
  try{
    if(auth.currentUser) return;
    const r = await withTimeout(auth.signInAnonymously(), 8000);
    if(r.timedOut){ showErrorBanner('El inicio de sesión anónimo tardó demasiado. Reintenta recargando la página.'); }
    if(r.error){ showErrorBanner('No se pudo iniciar sesión: ' + r.error.message + ' — revisa que "Anónimo" esté activado en Firebase Authentication.'); }
  }catch(e){
    showErrorBanner('No se pudo iniciar sesión: ' + e.message);
  }
}
async function init(){
  await ensureAnonAuth();
  try{
    state.config = await loadConfig();
  }catch(err){
    showErrorBanner('No se pudo cargar la configuración: ' + err.message);
    state.config = {groups:[]};
  }
  state.loading = false;
  render();
}

/* ============ TABS ============ */
const TABS = [
  {id:'inicio', label:'Inicio'},
  {id:'cuestionario', label:'Cuestionario del alumnado'},
  {id:'config', label:'Configuración (profesorado)'},
  {id:'analisis', label:'Análisis (profesorado)'},
];

function renderTabs(){
  const nav = document.getElementById('tabs');
  nav.innerHTML = TABS.map(t=>
    `<button class="${state.tab===t.id?'active':''}" data-act="gotoTab" data-arg="${t.id}">${t.label}</button>`
  ).join('') + (state.teacherUnlocked ? `<button data-act="teacherLogout" style="margin-left:auto; color:#F4C7B8;">Salir (profesorado)</button>` : '');
}

/* ============ RENDER ROOT ============ */
function render(){
  renderTabs();
  const app = document.getElementById('app');
  try{
    if(state.loading){ app.innerHTML = '<div class="empty">Cargando…</div>'; return; }
    if(state.tab==='inicio') app.innerHTML = renderInicio();
    else if(state.tab==='cuestionario') app.innerHTML = renderCuestionario();
    else if(state.tab==='config') app.innerHTML = state.teacherUnlocked ? renderConfig() : renderGate('config');
    else if(state.tab==='analisis') app.innerHTML = state.teacherUnlocked ? renderAnalisis() : renderGate('analisis');
  }catch(err){
    showErrorBanner('Fallo al dibujar la pantalla: ' + err.message);
    app.innerHTML = '<div class="panel"><p>Ha ocurrido un error al mostrar esta pantalla. Copia el mensaje rojo de arriba y compártelo. Mientras tanto, prueba a pulsar otra pestaña.</p></div>';
  }
}

/* ============ GATE ============ */
function renderGate(){
  return `
  <div class="panel gate">
    <h2>Acceso del profesorado</h2>
    <p class="muted">Esta sección incluye datos sensibles de convivencia. Inicia sesión con tu cuenta de profesorado.</p>
    <div style="max-width:280px; margin:14px auto; text-align:left;">
      <label>Correo</label>
      <input type="text" id="teacherEmail" placeholder="tu-correo@triana.salesianos.edu" value="${esc(state.lastEmail||'')}">
      <label>Contraseña</label>
      <input type="password" id="teacherPassword" placeholder="Contraseña">
    </div>
    <button class="btn" data-act="teacherLogin">Entrar</button>
    <p class="muted" style="margin-top:12px; font-size:12px;">Tu usuario se crea desde la consola de Firebase (Authentication → Sign-in method → Email/contraseña), no desde aquí.</p>
  </div>`;
}

/* ============ INICIO ============ */
function renderInicio(){
  return `
  <div class="panel">
    <h2>Qué es esta herramienta</h2>
    <p>Esta app organiza un sociograma para varios grupos del centro (de 1.º de ESO a 2.º de Bachillerato). El alumnado responde un breve cuestionario de forma anónima entre compañeros de su propia clase, y el profesorado obtiene un análisis por grupo (elecciones, reciprocidad, subgrupos, sociograma visual) y una comparativa global entre cursos.</p>
    <h3>Cómo funciona</h3>
    <ul class="tight">
      <li><strong>Configuración</strong> (profesorado): crea los grupos y da de alta al alumnado con nombre; la app genera un código anónimo para cada alumno/a.</li>
      <li><strong>Cuestionario</strong> (alumnado): cada alumno/a elige su clase, se identifica con su código y responde a las preguntas sobre sus compañeros.</li>
      <li><strong>Análisis</strong> (profesorado): resultados por grupo, sociograma visual y comparativa entre todos los cursos.</li>
    </ul>
  </div>
  <div class="disclaimer">
    <strong>Uso responsable de los datos.</strong> El sociograma refleja las relaciones del grupo en un momento concreto y no debe usarse como único instrumento de valoración. Los resultados deben contrastarse con la observación del profesorado, tutorías y otros instrumentos, y no demuestran por sí solos la existencia de acoso escolar. Trátalos de forma confidencial: no deben difundirse entre el alumnado ni las familias con datos identificativos. Los datos se guardan en Firebase; el acceso al panel de profesorado requiere iniciar sesión, y las reglas de la base de datos limitan quién puede leer las respuestas del alumnado.
  </div>`;
}

/* ============ CUESTIONARIO (alumnado) ============ */
function renderCuestionario(){
  const groups = state.config.groups;
  if(state.formStep==='done'){
    return `<div class="panel">
      <h2>¡Gracias!</h2>
      <p>Tu respuesta se ha guardado correctamente.</p>
      <button class="btn secondary" data-act="restartForm">Responder por otra persona</button>
    </div>`;
  }
  if(state.formStep==='answer'){
    return renderQuestionnaireForm();
  }
  // select step
  if(groups.length===0){
    return `<div class="panel"><p class="empty">Todavía no hay ningún grupo dado de alta. Pide a tu profesor o profesora que lo configure primero.</p></div>`;
  }
  const g = state.form.groupId ? groups.find(x=>x.id===state.form.groupId) : null;
  return `
  <div class="panel">
    <h2>Antes de empezar</h2>
    <p class="muted">Elige tu clase y después tu código de alumno/a. Tus respuestas sobre compañeros se guardan de forma anónima (por código, no por nombre) para el análisis.</p>
    <label>Curso y grupo</label>
    <select id="selGroup" data-act="onChangeGroup">
      <option value="">— Selecciona tu clase —</option>
      ${groups.map(gr=>`<option value="${gr.id}" ${state.form.groupId===gr.id?'selected':''}>${esc(gr.curso)} ${esc(gr.grupo)}</option>`).join('')}
    </select>
    ${g ? `
    <label>¿Quién eres?</label>
    <select id="selStudent" data-act="onChangeStudent">
      <option value="">— Selecciona tu código —</option>
      ${g.students.map(s=>`<option value="${s.code}" ${state.form.studentCode===s.code?'selected':''}>${esc(s.code)} — ${esc(s.name)}</option>`).join('')}
    </select>
    <p class="muted" style="margin-top:10px;">Si no ves tu nombre en la lista, avisa a tu profesor o profesora.</p>
    <button class="btn" data-act="startQuestionnaire" ${state.form.studentCode?'':'disabled'}>Empezar cuestionario</button>
    ` : ''}

function computeGroupStats(group, responses){
  const students = group.students;
  const stats = {};
  students.forEach(s=> stats[s.code] = {code:s.code, name:s.name, positivas:0, negativas:0, confianza:0, ayuda:0, lider:0, aislamiento:0, emitidas:0, reciprocas:0});
  let climaSum=0, climaCount=0;
  const posEdges = new Set();
  const negEdges = new Set();

  responses.forEach(r=>{
    const emitter = r.studentCode;
    if(!stats[emitter]) return;
    let emitCount=0;
    (r.q1||[]).forEach(c=>{ if(stats[c]){ stats[c].positivas++; posEdges.add(emitter+'|'+c); emitCount++; } });
    (r.q2||[]).forEach(c=>{ if(stats[c]){ stats[c].positivas++; posEdges.add(emitter+'|'+c); emitCount++; } });
    if(r.q3 && stats[r.q3]){ stats[r.q3].confianza++; emitCount++; }
    if(r.q4 && stats[r.q4]){ stats[r.q4].ayuda++; emitCount++; }
    if(r.q5 && stats[r.q5]){ stats[r.q5].lider++; emitCount++; }
    (r.q6||[]).forEach(c=>{ if(stats[c]){ stats[c].negativas++; negEdges.add(emitter+'|'+c); emitCount++; } });
    (r.q7||[]).forEach(c=>{ if(stats[c]){ stats[c].aislamiento++; } });
    if(r.q8 && stats[r.q8]){ stats[r.q8].positivas++; posEdges.add(emitter+'|'+r.q8); emitCount++; }
    if(typeof r.q9 === 'number'){ climaSum += r.q9; climaCount++; }
    stats[emitter].emitidas += emitCount;
  });

  const reciprocalPairs = [];
  const seenPairs = new Set();
  posEdges.forEach(edge=>{
    const parts = edge.split('|'); const a=parts[0], b=parts[1];
    const rev = b+'|'+a;
    const key = [a,b].sort().join('|');
    if(posEdges.has(rev) && !seenPairs.has(key)){
      seenPairs.add(key);
      reciprocalPairs.push([a,b]);
    }
  });
  reciprocalPairs.forEach(pair=>{
    if(stats[pair[0]]) stats[pair[0]].reciprocas++;
    if(stats[pair[1]]) stats[pair[1]].reciprocas++;
  });

  const adjacency = {};
  students.forEach(s=> adjacency[s.code]=new Set());
  reciprocalPairs.forEach(pair=>{ adjacency[pair[0]].add(pair[1]); adjacency[pair[1]].add(pair[0]); });
  const visited = new Set();
  const components = [];
  students.forEach(s=>{
    if(visited.has(s.code)) return;
    const stack=[s.code]; const comp=[];
    visited.add(s.code);
    while(stack.length){
      const cur = stack.pop(); comp.push(cur);
      adjacency[cur].forEach(n=>{ if(!visited.has(n)){ visited.add(n); stack.push(n); } });
    }
    components.push(comp);
  });
  const subgroups = components.filter(c=>c.length>=3);

  const respondentCount = responses.length;
  const participation = students.length ? Math.round((respondentCount/students.length)*1000)/10 : 0;
  const avgPositivas = avg(students.map(s=>stats[s.code].positivas));
  const avgNegativas = avg(students.map(s=>stats[s.code].negativas));
  const avgClima = climaCount ? Math.round((climaSum/climaCount)*100)/100 : null;

  const liderThreshold = Math.max(2, Math.ceil(respondentCount*0.2));
  const leaders = students.filter(s=> respondentCount>0 && stats[s.code].lider >= liderThreshold)
    .sort((a,b)=> stats[b.code].lider - stats[a.code].lider).map(s=>s.code);

  const bajaIntegracion = respondentCount>0 ? students.filter(s=> stats[s.code].positivas<=1).map(s=>s.code) : [];

  const rechazoThreshold = Math.max(2, Math.ceil(respondentCount*0.25));
  const rechazoSignificativo = respondentCount>0 ? students.filter(s=> stats[s.code].negativas >= rechazoThreshold).map(s=>s.code) : [];

  let puentes = [];
  if(subgroups.length>=2){
    const compOf = {};
    subgroups.forEach((comp,i)=> comp.forEach(code=> compOf[code]=i));
    students.forEach(s=>{
      const reached = new Set();
      posEdges.forEach(edge=>{
        const parts = edge.split('|'); const a=parts[0], b=parts[1];
        if(a===s.code && compOf[b]!==undefined) reached.add(compOf[b]);
        if(b===s.code && compOf[a]!==undefined) reached.add(compOf[a]);
      });
      if(compOf[s.code]!==undefined) reached.delete(compOf[s.code]);
      if(reached.size>=1) puentes.push(s.code);
    });
    puentes = Array.from(new Set(puentes));
  }

  const cohesionRatio = students.length ? Math.round((reciprocalPairs.length/students.length)*1000)/1000 : 0;
  let cohesionLevel = 'sin datos';
  if(respondentCount>0){
    if(cohesionRatio>=0.4 && (avgClima===null || avgClima>=3.5)) cohesionLevel='alto';
    else if(cohesionRatio<0.15 || (avgClima!==null && avgClima<2.8)) cohesionLevel='bajo';
    else cohesionLevel='medio';
  }

  return {stats, respondentCount, participation, avgPositivas, avgNegativas, avgClima, posEdges, negEdges, reciprocalPairs, subgroups, leaders, bajaIntegracion, rechazoSignificativo, puentes, cohesionLevel, cohesionRatio, liderThreshold, rechazoThreshold};
}

function renderGroupAnalysis(group){
  const responses = state.responsesCache[group.id] || [];
  const gs = computeGroupStats(group, responses);
  const students = group.students;

  const codeToName = {}; students.forEach(s=>codeToName[s.code]=s.name);

  let html = `<div class="panel">
    <h2>${esc(group.curso)} ${esc(group.grupo)}</h2>
    <div class="stat-grid">
      <div class="stat-box"><div class="n">${students.length}</div><div class="lbl">Alumnado</div></div>
      <div class="stat-box"><div class="n">${gs.participation}%</div><div class="lbl">Participación (${gs.respondentCount}/${students.length})</div></div>
      <div class="stat-box"><div class="n">${gs.avgClima===null?'—':gs.avgClima}</div><div class="lbl">Clima medio (1–5)</div></div>
      <div class="stat-box"><div class="n">${gs.reciprocalPairs.length}</div><div class="lbl">Relaciones recíprocas</div></div>
      <div class="stat-box"><div class="n">${gs.avgPositivas}</div><div class="lbl">Media elecciones positivas</div></div>
      <div class="stat-box"><div class="n">${gs.avgNegativas}</div><div class="lbl">Media elecciones negativas</div></div>
      <div class="stat-box"><div class="n">${cohesionLabel(gs.cohesionLevel)}</div><div class="lbl">Cohesión grupal</div></div>
      <div class="stat-box"><div class="n">${gs.subgroups.length}</div><div class="lbl">Subgrupos detectados</div></div>
    </div>
    <p class="muted">Criterio de cohesión: proporción de vínculos positivos recíprocos respecto al tamaño del grupo (recíprocas / alumnado = ${gs.cohesionRatio}), combinado con el clima medio declarado. Alto ≥ 0,4 y clima ≥ 3,5 · Bajo &lt; 0,15 o clima &lt; 2,8 · Medio en el resto de casos.</p>
    ${gs.respondentCount===0 ? '<p class="muted"><strong>Todavía no hay respuestas para este grupo.</strong></p>' : ''}
  </div>`;

  if(gs.respondentCount>0){
    html += `<div class="panel">
      <h2>Sociograma</h2>
      ${renderSociogramSVG(group, gs)}
      <div class="legend">
        <span><span class="swatch" style="background:var(--sage);"></span> Elección positiva</span>
        <span><span class="swatch" style="background:var(--ink); height:4px;"></span> Elección recíproca</span>
        <span><span class="swatch" style="background:var(--clay); border-top:2px dashed var(--clay); height:0;"></span> Elección negativa</span>
        <span><span class="dot" style="background:var(--gold);"></span> Posible liderazgo positivo</span>
        <span><span class="dot" style="background:#fff; border:2px dashed var(--ink-soft);"></span> Baja integración</span>
        <span><span class="dot" style="background:#fff; border:2px solid var(--clay);"></span> Rechazo significativo</span>
      </div>
    </div>`;

    html += `<div class="panel">
      <h3>Posibles líderes positivos</h3>
      ${listOrNone(gs.leaders, codeToName, 'No se identifican liderazgos claros con los datos actuales.')}
      <h3>Alumnado con posible baja integración</h3>
      <p class="muted">Se recomienda contrastar esta información con la observación en el aula antes de sacar conclusiones.</p>
      ${listOrNone(gs.bajaIntegracion, codeToName, 'No se detectan casos de baja integración con los datos actuales.')}
      <h3>Posibles rechazos significativos</h3>
      <p class="muted">Los datos sugieren revisar estos casos; no implican por sí solos ninguna situación de acoso.</p>
      ${listOrNone(gs.rechazoSignificativo, codeToName, 'No se detectan casos de rechazo significativo con los datos actuales.')}
      <h3>Alumnado puente entre subgrupos</h3>
      ${listOrNone(gs.puentes, codeToName, 'No se identifican alumnos/as puente (o el grupo no muestra subgrupos diferenciados).')}
      <h3>Subgrupos detectados</h3>
      ${gs.subgroups.length===0 ? '<p class="muted">No se detectan subgrupos estables (de 3 o más) con los datos actuales.</p>' :
        `<ul class="tight">${gs.subgroups.map((sg,i)=>`<li>Subgrupo ${i+1}: ${sg.map(c=>esc(c)+' ('+esc(codeToName[c]||'')+')').join(', ')}</li>`).join('')}</ul>`}
    </div>`;

    html += `<div class="panel">
      <h3>Detalle por alumno/a</h3>
      <table>
        <thead><tr><th>Código</th><th>Nombre</th><th>Positivas recib.</th><th>Negativas recib.</th><th>Recíprocas</th><th>Confianza</th><th>Ayuda</th><th>Liderazgo</th><th>Aislamiento (menciones)</th><th>Emitidas</th></tr></thead>
        <tbody>
          ${students.map(s=>{ const st=gs.stats[s.code]; return `<tr><td>${esc(s.code)}</td><td>${esc(s.name)}</td><td>${st.positivas}</td><td>${st.negativas}</td><td>${st.reciprocas}</td><td>${st.confianza}</td><td>${st.ayuda}</td><td>${st.lider}</td><td>${st.aislamiento}</td><td>${st.emitidas}</td></tr>`; }).join('')}
        </tbody>
      </table>
    </div>`;

    html += `<div class="panel">
      <h3>Ficha individual privada (solo profesorado)</h3>
      <p class="muted">Pensada como apoyo para una conversación de tutoría, no para compartir con el alumnado ni las familias.</p>
      <select id="studentReportSelect" data-act="setStudentReport">
        <option value="">— Elegir alumno/a —</option>
        ${students.map(s=>`<option value="${s.code}" ${state.studentReportCode===s.code?'selected':''}>${esc(s.code)} — ${esc(s.name)}</option>`).join('')}
      </select>
      ${state.studentReportCode ? renderStudentReport(group, gs) : ''}
    </div>`;
  }

  html += renderDisclaimer();
  return html;
}

function renderStudentReport(group, gs){
  const code = state.studentReportCode;
  const s = group.students.find(x=>x.code===code);
  if(!s) return '';
  const st = gs.stats[code];
  const esLider = gs.leaders.indexOf(code)>=0;
  const bajaIntegracion = gs.bajaIntegracion.indexOf(code)>=0;
  const rechazoSignificativo = gs.rechazoSignificativo.indexOf(code)>=0;
  const esPuente = gs.puentes.indexOf(code)>=0;
  const aislamientoMencionado = st.aislamiento > 0;

  let bullets = [];
  bullets.push(`Recibe ${st.positivas} elección(es) positiva(s) en total (de las cuales ${st.reciprocas} son recíprocas), frente a una media de ${gs.avgPositivas} en el grupo.`);
  bullets.push(`Recibe ${st.negativas} elección(es) negativa(s), frente a una media de ${gs.avgNegativas} en el grupo.`);
  if(st.confianza>0 || st.ayuda>0 || st.lider>0){
    bullets.push(`Ha sido mencionado/a como persona de confianza ${st.confianza} vez/veces, como alguien que ayuda ${st.ayuda} vez/veces, y como referente positivo o liderazgo ${st.lider} vez/veces.`);
  }
  if(bajaIntegracion){
    bullets.push(`El número de elecciones positivas recibidas es bajo en comparación con el resto del grupo. Los datos sugieren una posible situación de baja integración; conviene contrastarlo con la observación directa en el aula antes de sacar conclusiones.`);
  }
  if(rechazoSignificativo){
    bullets.push(`Ha recibido más menciones negativas de lo habitual dentro de este grupo. Se recomienda revisar este caso con prudencia: el dato por sí solo no demuestra ninguna situación de acoso ni conflicto grave, pero conviene un seguimiento.`);
  }
  if(aislamientoMencionado){
    bullets.push(`${st.aislamiento} compañero(s) han señalado, al preguntarles por el grupo, una posible situación de aislamiento relacionada con este alumno/a. No existen datos suficientes para concluir nada por sí solo; se recomienda contrastarlo en tutoría.`);
  }
  if(esLider){
    bullets.push(`Aparece con frecuencia como referente de influencia positiva en el grupo.`);
  }
  if(esPuente){
    bullets.push(`Sus elecciones positivas conectan a más de un subgrupo dentro de la clase; podría actuar como puente entre compañeros que de otro modo no se relacionan tanto.`);
  }
  if(!bajaIntegracion && !rechazoSignificativo && !aislamientoMencionado){
    bullets.push(`No se identifican, con los datos actuales, señales que sugieran una necesidad de intervención específica.`);
  }

  let acciones = [];
  if(bajaIntegracion || aislamientoMencionado){
    acciones.push('Entrevista individual breve para conocer cómo vive la relación con el grupo.');
    acciones.push('Actividades de aprendizaje cooperativo con reagrupamientos puntuales.');
    acciones.push('Valorar un programa de alumnado ayudante o mediación entre iguales.');
  }
  if(rechazoSignificativo){
    acciones.push('Observación discreta en momentos de trabajo en grupo o recreo.');
    acciones.push('Entrevista individual, con enfoque no acusatorio, para contextualizar el dato.');
  }
  if(esLider){
    acciones.push('Aprovechar su influencia positiva como apoyo en dinámicas de cohesión grupal (con su acuerdo).');
  }
  if(acciones.length===0){
    acciones.push('Seguimiento ordinario, sin actuación específica adicional por ahora.');
  }

  return `
  <div style="margin-top:14px; border:1px solid var(--line); border-radius:8px; padding:14px; background:#FCFBF8;">
    <h3 style="margin-top:0;">${esc(s.code)} — ${esc(s.name)}</h3>
    <ul class="tight">${bullets.map(b=>`<li>${b}</li>`).join('')}</ul>
    <h3>Posibles actuaciones de tutoría</h3>
    <ul class="tight">${acciones.map(a=>`<li>${a}</li>`).join('')}</ul>
    <p class="muted" style="margin-top:10px;">Esta ficha es una ayuda para la reflexión del profesorado, no un diagnóstico. Documento confidencial: no debe entregarse ni mostrarse al alumnado ni a las familias tal cual.</p>
  </div>`;
}

function listOrNone(codes, codeToName, emptyMsg){
  return `<ul class="tight">${codes.map(c=>`<li>${esc(c)} — ${esc(codeToName[c]||'')}</li>`).join('')}</ul>`;
}

function cohesionLabel(level){
  if(level==='alto') return 'Alta';
  if(level==='medio') return 'Media';
  if(level==='bajo') return 'Baja';
  return 'Sin datos';
}

function renderSociogramSVG(group, gs){
  const students = group.students;
  const n = students.length;
  const W=680, H=560, cx=340, cy=280, R=Math.min(220, 40+ n*6);
  const pos = {};
  students.forEach((s,i)=>{
    const angle = (2*Math.PI*i/Math.max(n,1)) - Math.PI/2;
    pos[s.code] = { x: cx + R*Math.cos(angle), y: cy + R*Math.sin(angle) };
  });
  const reciprocalSet = new Set(gs.reciprocalPairs.map(p=>[p[0],p[1]].sort().join('|')));

  let edgesSvg = '';
  gs.posEdges.forEach(edge=>{
    const parts = edge.split('|'); const a=parts[0], b=parts[1];
    const key = [a,b].sort().join('|');
    if(reciprocalSet.has(key)) return; // draw once below as reciprocal
    if(!pos[a] || !pos[b]) return;
    edgesSvg += `<line x1="${pos[a].x}" y1="${pos[a].y}" x2="${pos[b].x}" y2="${pos[b].y}" stroke="var(--sage)" stroke-width="1.4" marker-end="url(#arrowPos)" opacity="0.8"/>`;
  });
  reciprocalSet.forEach(key=>{
    const parts = key.split('|'); const a=parts[0], b=parts[1];
    if(!pos[a] || !pos[b]) return;
    edgesSvg += `<line x1="${pos[a].x}" y1="${pos[a].y}" x2="${pos[b].x}" y2="${pos[b].y}" stroke="var(--ink)" stroke-width="2.4" opacity="0.85"/>`;
  });
  gs.negEdges.forEach(edge=>{
    const parts = edge.split('|'); const a=parts[0], b=parts[1];
    if(!pos[a] || !pos[b]) return;
    edgesSvg += `<line x1="${pos[a].x}" y1="${pos[a].y}" x2="${pos[b].x}" y2="${pos[b].y}" stroke="var(--clay)" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrowNeg)" opacity="0.6"/>`;
  });

  let nodesSvg = '';
  students.forEach(s=>{
    const st = gs.stats[s.code];
    const p = pos[s.code];
    const radius = 13 + Math.min(st.positivas*2, 16);
    let fill = '#FFFFFF';
    let stroke = 'var(--ink-soft)';
    let strokeW = 1.5;
    let dash = '';
    if(gs.leaders.indexOf(s.code)>=0){ fill = 'var(--gold)'; stroke='#8a6a1e'; }
    if(gs.rechazoSignificativo.indexOf(s.code)>=0){ stroke = 'var(--clay)'; strokeW=2.6; }
    if(gs.bajaIntegracion.indexOf(s.code)>=0){ dash='4,3'; stroke='var(--ink-soft)'; }
    nodesSvg += `<circle cx="${p.x}" cy="${p.y}" r="${radius}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeW}" stroke-dasharray="${dash}"/>`;
    nodesSvg += `<text x="${p.x}" y="${p.y+radius+13}" text-anchor="middle" font-size="10.5" fill="var(--ink)">${esc(s.code)}</text>`;
  });

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%; max-width:680px; display:block; margin:0 auto;">
    <defs>
      <marker id="arrowPos" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--sage)"/></marker>
      <marker id="arrowNeg" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--clay)"/></marker>
    </defs>
    ${edgesSvg}
    ${nodesSvg}
  </svg>`;
}

function renderGlobalComparison(){
  const groups = state.config.groups;
  const rows = groups.map(g=>{
    const responses = state.responsesCache[g.id] || [];
    const gs = computeGroupStats(g, responses);
    return {g, gs};
  });

  let html = `<div class="panel">
    <h2>Comparativa entre grupos</h2>
    ${rows.length===0 ? '<p class="empty">No hay grupos todavía.</p>' : `
    <table>
      <thead><tr>
        <th>Curso y grupo</th><th>Alumnado</th><th>Participación</th><th>Cohesión</th><th>Clima medio</th>
        <th>Recíprocas</th><th>Líderes+</th><th>Baja integr.</th><th>Rechazo signif.</th><th>Subgrupos</th>
      </tr></thead>
      <tbody>
        ${rows.map(({g,gs})=>`<tr>
          <td>${esc(g.curso)} ${esc(g.grupo)}</td>
          <td>${g.students.length}</td>
          <td>${gs.participation}%</td>
          <td>${cohesionLabel(gs.cohesionLevel)}</td>
          <td>${gs.avgClima===null?'—':gs.avgClima}</td>
          <td>${gs.reciprocalPairs.length}</td>
          <td>${gs.leaders.length}</td>
          <td>${gs.bajaIntegracion.length}</td>
          <td>${gs.rechazoSignificativo.length}</td>
          <td>${gs.subgroups.length}</td>
        </tr>`).join('')}
      </tbody>
    </table>`}
  </div>`;

  html += renderSynthesis(rows);
  html += renderDisclaimer();
  return html;
}

function renderSynthesis(rows){
  const withData = rows.filter(r=> r.gs.respondentCount>0 && r.gs.participation>=50);
  if(withData.length===0){
    return `<div class="panel"><h2>Síntesis global</h2><p class="muted">No hay datos suficientes (con al menos un 50% de participación) para elaborar una síntesis comparativa fiable todavía.</p></div>`;
  }
  const eso = withData.filter(r=> etapaOf(r.g.curso)==='ESO');
  const bach = withData.filter(r=> etapaOf(r.g.curso)==='BACH');

  let bullets = [];

  const cohesionOrder = {alto:3, medio:2, bajo:1, 'sin datos':0};
  const sorted = [...withData].sort((a,b)=> cohesionOrder[b.gs.cohesionLevel]-cohesionOrder[a.gs.cohesionLevel]);
  if(sorted.length>0){
    const top = sorted[0];
    bullets.push(`Los datos sugieren que <strong>${esc(top.g.curso)} ${esc(top.g.grupo)}</strong> presenta el nivel de cohesión más alto entre los grupos con participación suficiente.`);
    const bottom = sorted[sorted.length-1];
    if(bottom.g.id !== top.g.id){
      bullets.push(`<strong>${esc(bottom.g.curso)} ${esc(bottom.g.grupo)}</strong> es el grupo que, según los datos disponibles, podría necesitar más atención tutorial en materia de cohesión y convivencia.`);
    }
  }

  if(eso.length>0 && bach.length>0){
    const avgCohEso = avg(eso.map(r=>r.gs.cohesionRatio));
    const avgCohBach = avg(bach.map(r=>r.gs.cohesionRatio));
    const avgClimaEso = avg(eso.filter(r=>r.gs.avgClima!==null).map(r=>r.gs.avgClima));
    const avgClimaBach = avg(bach.filter(r=>r.gs.avgClima!==null).map(r=>r.gs.avgClima));
    if(avgCohBach > avgCohEso){
      bullets.push(`Los grupos de Bachillerato muestran, en conjunto, una proporción de relaciones recíprocas algo mayor que los de ESO (${avgCohBach} frente a ${avgCohEso}); conviene contrastarlo con más cursos antes de generalizar.`);
    } else if(avgCohEso > avgCohBach){
      bullets.push(`Los grupos de ESO muestran, en conjunto, una proporción de relaciones recíprocas algo mayor que los de Bachillerato (${avgCohEso} frente a ${avgCohBach}); conviene contrastarlo con más cursos antes de generalizar.`);
    } else {
      bullets.push(`No se observan diferencias claras en cohesión entre ESO y Bachillerato con los datos actuales.`);
    }
    bullets.push(`El clima medio declarado es de ${avgClimaEso===0?'—':avgClimaEso} en ESO y de ${avgClimaBach===0?'—':avgClimaBach} en Bachillerato.`);
  } else {
    bullets.push(`No existen datos suficientes de ambas etapas (ESO y Bachillerato) para compararlas entre sí todavía.`);
  }

  const totalRechazo = withData.reduce((a,r)=>a+r.gs.rechazoSignificativo.length,0);
  const totalBaja = withData.reduce((a,r)=>a+r.gs.bajaIntegracion.length,0);
  bullets.push(`En conjunto, se han identificado ${totalBaja} caso(s) de posible baja integración y ${totalRechazo} caso(s) de posible rechazo significativo en los grupos con datos suficientes. Estas cifras son una señal para el seguimiento tutorial, no un diagnóstico.`);

  return `<div class="panel">
    <h2>Síntesis global</h2>
    <ul class="tight">${bullets.map(b=>`<li>${b}</li>`).join('')}</ul>
    <p class="muted">Basado únicamente en los grupos con al menos un 50% de participación (${withData.length} de ${rows.length} grupos).</p>
  </div>`;
}

function renderDisclaimer(){
  return `<div class="disclaimer">
    Recuerda: el sociograma refleja las relaciones del grupo en un momento determinado y no debe utilizarse como único instrumento de valoración. Debe contrastarse con la observación del profesorado, entrevistas y tutorías. No demuestra por sí solo la existencia de acoso escolar. Trata esta información de forma confidencial y no la difundas entre el alumnado ni las familias con datos identificativos.
  </div>`;
}

/* ============ CSV EXPORT ============ */
function exportAllCsv(){
  const groups = state.config.groups;
  let lines = [['grupo_id','curso','grupo','codigo_alumno','positivas_recibidas','negativas_recibidas','reciprocas','confianza','ayuda','liderazgo','menciones_aislamiento','elecciones_emitidas','participacion_grupo_pct','clima_medio_grupo','cohesion_grupo'].join(';')];
  groups.forEach(g=>{
    const responses = state.responsesCache[g.id] || [];
    const gs = computeGroupStats(g, responses);
    g.students.forEach(s=>{
      const st = gs.stats[s.code];
      lines.push([g.id, g.curso, g.grupo, s.code, st.positivas, st.negativas, st.reciprocas, st.confianza, st.ayuda, st.lider, st.aislamiento, st.emitidas, gs.participation, gs.avgClima===null?'':gs.avgClima, gs.cohesionLevel].join(';'));
    });
  });
  const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sociograma_export.csv';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

/* ============ ACTIONS ============ */
const actions = {
  gotoTab(arg){ state.tab = arg; if(arg==='cuestionario'){ state.formStep='select'; } render(); if(arg==='analisis' && state.teacherUnlocked){ ensureResponsesLoadedAll(); } },
  async teacherLogin(){
    const emailEl = document.getElementById('teacherEmail');
    const passEl = document.getElementById('teacherPassword');
    if(!emailEl || !passEl) return;
    const email = emailEl.value.trim();
    const password = passEl.value;
    if(!email || !password){ toast('Escribe tu correo y contraseña'); return; }
    state.lastEmail = email;
    const r = await withTimeout(auth.signInWithEmailAndPassword(email, password), 8000);
    if(r.timedOut){ toast('El inicio de sesión tardó demasiado, inténtalo de nuevo'); return; }
    if(r.error){
      const code = r.error.code || '';
      let msg = 'No se pudo iniciar sesión.';
      if(code.indexOf('wrong-password')>=0 || code.indexOf('invalid-credential')>=0) msg = 'Contraseña incorrecta.';
      else if(code.indexOf('user-not-found')>=0) msg = 'No existe ese usuario en Firebase Authentication.';
      else if(code.indexOf('invalid-email')>=0) msg = 'Correo no válido.';
      else if(code.indexOf('too-many-requests')>=0) msg = 'Demasiados intentos. Espera un momento.';
      toast(msg);
      return;
    }
    state.teacherUnlocked = true;
    if(state.tab==='analisis') ensureResponsesLoadedAll();
    render();
  },
  async teacherLogout(){
    state.teacherUnlocked = false;
    state.tab = 'inicio';
    try{ await auth.signOut(); }catch(e){}
    await ensureAnonAuth();
    render();
  },
  onChangeGroup(){
    const el = document.getElementById('selGroup');
    state.form.groupId = el.value || null;
    state.form.studentCode = null;
    render();
  },
  onChangeStudent(){
    const el = document.getElementById('selStudent');
    state.form.studentCode = el.value || null;
    render();
  },
  startQuestionnaire(){
    if(!state.form.studentCode) return;
    state.form = Object.assign(state.form, {q1:[], q2:[], q3:'', q4:'', q5:'', q6:[], q7:[], q7none:false, q8:'', q9:null, q10:''});
    state.formStep = 'answer';
    render();
  },
  cancelForm(){
    state.formStep = 'select';
    render();
  },
  restartForm(){
    state.form = {groupId:null, studentCode:null, q1:[], q2:[], q3:'', q4:'', q5:'', q6:[], q7:[], q7none:false, q8:'', q9:null, q10:''};
    state.formStep = 'select';
    render();
  },
  togglePick(arg, el){
    const parts = arg.split('|'); const name=parts[0], code=parts[1];
    const list = state.form[name];
    const max = parseInt(el.closest('.pick-list').dataset.max, 10);
    const idx = list.indexOf(code);
    if(el.checked){
      if(idx<0){
        if(list.length>=max){ el.checked=false; toast('Máximo '+max+' seleccionados'); return; }
        list.push(code);
      }
    } else {
      if(idx>=0) list.splice(idx,1);
    }
    const counter = document.getElementById('count_'+name);
    if(counter) counter.textContent = list.length;
  },
  toggleNone(arg, el){
    state.form.q7none = el.checked;
    if(el.checked) state.form.q7 = [];
    render();
  },
  setSingle(arg, el){
    state.form[arg] = el.value;
  },
  setClima(arg){
    state.form.q9 = parseInt(arg,10);
  },
  setText(arg, el){
    state.form.q10 = el.value;
  },
  async submitQuestionnaire(){
    const f = state.form;
    const g = state.config.groups.find(x=>x.id===f.groupId);
    if(!g) return;
    if(f.q1.length===0){ toast('Responde a la pregunta 1'); return; }
    if(f.q2.length===0){ toast('Responde a la pregunta 2'); return; }
    if(!f.q3){ toast('Responde a la pregunta 3'); return; }
    if(!f.q4){ toast('Responde a la pregunta 4'); return; }
    if(!f.q5){ toast('Responde a la pregunta 5'); return; }
    if(!f.q8){ toast('Responde a la pregunta 8'); return; }
    if(!f.q9){ toast('Valora el ambiente de la clase'); return; }

    const responseObj = {
      studentCode: f.studentCode,
      timestamp: new Date().toISOString(),
      q1: f.q1, q2: f.q2, q3: f.q3, q4: f.q4, q5: f.q5, q6: f.q6, q7: f.q7none? [] : f.q7, q8: f.q8, q9: f.q9, q10: f.q10
    };
    const ok = await saveOneResponse(g.id, f.studentCode, responseObj);
    if(!ok){ toast('No se pudo guardar. Vuelve a intentarlo.'); return; }
    if(!state.responsesCache[g.id]) state.responsesCache[g.id] = [];
    state.responsesCache[g.id] = state.responsesCache[g.id].filter(r=>r.studentCode!==f.studentCode);
    state.responsesCache[g.id].push(responseObj);
    state.formStep = 'done';
    render();
  },
  toggleGroupOpen(arg){
    state['open_'+arg] = !state['open_'+arg];
    render();
  },
  deleteGroup(arg){
    state.confirmingGroup = arg;
    render();
  },
  cancelDeleteGroup(){
    state.confirmingGroup = null;
    render();
  },
  async confirmDeleteGroup(arg){
    state.config.groups = state.config.groups.filter(g=>g.id!==arg);
    state.confirmingGroup = null;
    render();
    saveConfig(state.config);
    fbRemove('responses/'+arg);
  },
  async addStudents(arg){
    const ta = document.getElementById('bulkNames_'+arg);
    if(!ta) return;
    const names = ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
    if(names.length===0) return;
    const g = state.config.groups.find(x=>x.id===arg);
    if(!g) return;
    const prefix = abbrevCurso(g.curso) + g.grupo.toUpperCase();
    let nextIndex = g.students.length + 1;
    names.forEach(name=>{
      const code = prefix + '-' + String(nextIndex).padStart(2,'0');
      g.students.push({code, name});
      nextIndex++;
    });
    ta.value = '';
    render();
    toast(names.length + ' alumno/a(s) añadido/s');
    saveConfig(state.config);
  },
  deleteStudent(arg){
    state.confirmingStudent = arg;
    render();
  },
  cancelDeleteStudent(){
    state.confirmingStudent = null;
    render();
  },
  async confirmDeleteStudent(arg){
    const parts = arg.split('|'); const groupId=parts[0], code=parts[1];
    const g = state.config.groups.find(x=>x.id===groupId);
    if(!g) return;
    g.students = g.students.filter(s=>s.code!==code);
    state.confirmingStudent = null;
    render();
    saveConfig(state.config);
    fbRemove('responses/'+groupId+'/'+code);
  },
  setAnalysisGroup(){
    const el = document.getElementById('analysisGroupSelect');
    state.analysisGroupId = el.value;
    state.studentReportCode = null;
    ensureResponsesLoadedAll();
    render();
  },
  setStudentReport(){
    const el = document.getElementById('studentReportSelect');
    state.studentReportCode = el.value || null;
    render();
  },
  async refreshAnalysis(){
    await ensureResponsesLoadedAll(true);
    toast('Datos actualizados');
    render();
  },
  exportAllCsv(){
    exportAllCsv();
  },
};

async function ensureResponsesLoadedAll(force){
  const groups = state.config.groups;
  for(const g of groups){
    if(force || !state.responsesCache[g.id]){
      state.responsesCache[g.id] = await loadResponses(g.id);
    }
  }
}

/* ============ FORM SUBMISSIONS ============ */
async function handleFormSubmit(form){
  if(form.dataset.form === 'addGroup'){
    const curso = form.elements.curso.value;
    const grupo = form.elements.grupo.value.trim().toUpperCase();
    if(!grupo){ toast('Escribe la letra del grupo (por ejemplo, A)'); return; }
    const exists = state.config.groups.some(g=>g.curso===curso && g.grupo===grupo);
    if(exists){ toast('Ese grupo ya existe'); return; }
    state.config.groups.push({ id: uid(), curso, grupo, students: [] });
    state.config.groups.sort((a,b)=> cursoIndex(a.curso)-cursoIndex(b.curso) || a.grupo.localeCompare(b.grupo));
    render();
    toast('Grupo creado');
    saveConfig(state.config);
  }
}

  const el = e.target.closest('[data-act]');

  const el = e.target.closest('[data-act]');
